[notebook]
dir = "~/Notes"

[note]
language = "en"
default-title = "Untitled"
filename = "{{id}}"
extension = "md"
id-charset = "alphanum"
id-length = 8
id-case = "lower"
template = "default.md"

[extra]
author = ""

[format.markdown]
link-format = "wiki"
hashtags = true

[tool]
editor = "nvim"
shell = "/opt/homebrew/bin/fish"
pager = "bat --style=plain --language=markdown"
fzf-preview = "bat --style=plain --language=markdown --color=always {path}"

[lsp]

[lsp.diagnostics]
wiki-title = "hint"
dead-link = "error"

[filter]
recents = "--sort created- --created-after 'last two weeks'"

[alias]
ls    = "zk list --quiet $@"
daily = "zk new --no-input --title 'Daily Notes' '$ZK_NOTEBOOK_DIR/journal'"
week  = "zk list --sort created- --created-after 'last 7 days' --quiet $@"
