[storage]
engine = file_system
path = Sync/Application/
directory = mackup

[applications_to_sync]
# macOS System
MacOSX
Terminal

# Menu Bar & System Utilities
Bartender
IStat-Menus

# Productivity & Automation
Alfred
CotEditor
Hazel

# Backup
Arq

# Developer Tools
Atuin
GnuPG
Homebrew
Kubectl

# Custom (defined in mackup/)
Aerial
Keyboard-Layouts
MonitorControl

[applications_to_ignore]
# Managed via dotfiles symlinks — mackup must not touch these
Bat
Fish
Git
Hammerspoon
Kitty
Lazygit
Neovim
Starship
Tmux
Yazi

# Security-sensitive — manage separately
SSH
